# ============================================================
#  DzusillCore - database connection
#  Keep this file out of version control if it holds real
#  credentials. The plugin runs fine with enabled: false.
# ============================================================

# Master switch. When false, no connection is opened and the
# plugin works without a database.
enabled: false

# Backend type: MYSQL or POSTGRESQL
type: MYSQL

host: localhost
port: 3306
database: minecraft
username: root
password: ""

pool:
  # Maximum number of pooled connections
  maximum-pool-size: 10
  # How long to wait (ms) for a connection before failing
  connection-timeout-ms: 30000

# Extra JDBC driver properties (optional)
properties:
  useSSL: "false"
  characterEncoding: "utf8"
